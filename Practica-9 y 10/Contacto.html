<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reclutamiento Shelby - Práctica 10</title>
    <link rel="stylesheet" href="Css/style.css">
</head>
<body>
    <nav>
        <ul class="menu-navegacion">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="personajes.html">Personajes</a></li>
            <li><a href="temporadas.html">Temporadas</a></li>
            <li><a href="critica.html">Crítica</a></li>
            <li><a href="contacto.html">Unirse</a></li>
        </ul>
    </nav>

    <header id="cabecera-principal">
        <h1>Formulario de Reclutamiento</h1>
        <p>¿Es usted digno de portar la gorra?</p>
    </header>

    <main class="tarjeta-personaje">
        <form action="#">
            <label for="nombre">Nombre Completo:</label><br>
            <input type="text" id="nombre" name="nombre" required style="width:100%; margin-bottom:15px; background:#333; color:white; border:1px solid #d4af37;">
            
            <label for="email">Correo de Contacto:</label><br>
            <input type="email" id="email" name="email" required style="width:100%; margin-bottom:15px; background:#333; color:white; border:1px solid #d4af37;">
            
            <label for="faccion">Elegir Facción:</label><br>
            <select id="faccion" name="faccion" style="width:100%; margin-bottom:15px; background:#333; color:white; border:1px solid #d4af37;">
                <option value="shelby">Shelby Company Ltd.</option>
                <option value="solomons">Operaciones en Camden Town</option>
                <option value="garrison">Personal del Garrison Pub</option>
            </select>

            <button type="submit" id="boton-unirse">Enviar Solicitud</button>
        </form>
    </main>
</body>
</html>
